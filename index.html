<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="A FREE online metronome with a pendulum that goes up and down, to help the player to better visualize an up-beat and a down-beat."
    />
    <link rel="icon" type="image/x-icon" href="images/favicon1-32x32.png" />
    <title>Upbeat Metronome</title>
    <!-- <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-240359072-1"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "UA-240359072-1");
    </script> -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="pendulum">
      <button id="displayModeToggle" class="display-mode-toggle" type="button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 512 512"
          width="32"
          height="32"
        >
          <g
            fill="none"
            stroke="#505050"
            stroke-width="26"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M 26 256 Q 130 102 256 102 Q 382 102 486 256 Q 382 410 256 410 Q 130 410 26 256 Z"
            />
            <circle cx="256" cy="256" r="87" />
          </g>
          <circle cx="256" cy="256" r="41" fill="#505050" />
        </svg>
      </button>
      <div id="lottie">
        <lottie-player
          src="bounce60fps.json"
          background="transparent"
          speed="1"
        ></lottie-player>
      </div>
      <div id="myDot" class="red"></div>
      <div class="bigC"></div>
      <!-- <div class="whiteCup"></div> -->
      <div class="whiteCdn" display="none"></div>
      <div id="sineCanvasContainer">
        <canvas id="sineCanvas"></canvas>
      </div>
    </div>
    <div class="controls">
      <div
        onclick="decreaseTempo()"
        onmousedown="tempoDown()"
        onmouseup="clearTempoDown()"
        onmouseout="clearTempoDown()"
        class="tempo-btn upDown"
        id="tempoDown"
      >
        -
      </div>
      <div class="wrapper">
        <div class="tempo-display">
          <div>
            <p class="bpmDisplay">60</p>
          </div>
        </div>

        <div>
          <div id="onOff" class="play"></div>

          <!-- <button id="onOff"></button> -->
        </div>
      </div>
      <div
        onclick="increaseTempo()"
        onmousedown="tempoUp()"
        onmouseup="clearTempoUp()"
        onmouseout="clearTempoUp()"
        class="tempo-btn upDown"
        id="tempoUp"
      >
        +
      </div>
    </div>
    <script src="Tone.min.js"></script>
    <!-- <script src="matter.min.js"></script> -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script> -->
    <script src="script.js"></script>
  </body>
</html>
